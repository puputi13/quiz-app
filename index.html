<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="layout">
    <section class="game-area">
      <h1>Web Tetris</h1>
      <canvas id="board" width="300" height="600" aria-label="Tetris board"></canvas>
      <p id="status">Press Enter to start</p>
    </section>

    <aside class="panel">
      <div class="card">
        <h2>Score</h2>
        <p id="score">0</p>
      </div>
      <div class="card">
        <h2>Lines</h2>
        <p id="lines">0</p>
      </div>
      <div class="card">
        <h2>Level</h2>
        <p id="level">1</p>
      </div>
      <div class="card controls">
        <h2>Controls</h2>
        <ul>
          <li>üę üĘ : move</li>
          <li>üź : soft drop</li>
          <li>ü¬ / X : rotate</li>
          <li>Z : rotate left</li>
          <li>Space : hard drop</li>
          <li>P : pause</li>
          <li>Enter : start/restart</li>
        </ul>
      </div>
    </aside>
  </main>
  <script src="main.js"></script>
</body>
</html>
